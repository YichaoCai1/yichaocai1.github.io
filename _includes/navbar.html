<nav class="site-top-nav" aria-label="Site navigation">
    <div class="{% if page.container_class %}{{ page.container_class }}{% else %}container-lg{% endif %} site-top-nav-inner">
        <a class="site-top-nav-brand" href="{{ '/' | relative_url }}">{{ site.data.profile.primary_name }}</a>
        <div class="site-top-nav-links">
            {% for item in site.data.navigation.pages %}
            <a class="{% if item.name == page.navbar_title %}active{% endif %}" href="{{ item.url | relative_url }}">{{ item.name }}</a>
            {% endfor %}
        </div>
    </div>
</nav>
