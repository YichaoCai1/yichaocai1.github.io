<style>
    .custom-radius {
        border-radius: 15px;
    }

    .service-name {
        font-weight: 400;
    }
</style>

<div class="row mt-3">
    <div class="col">
        <div class="card border-0 shadow-sm bg-white custom-radius">
            <div class="card-body p-4">
                <div class="mx-2 my-1">
                    <h5>Academic Service</h5>
                    <ul class="list small pl-3 mb-1">
                        {% for item in site.data.profile.service %}
                        <li class="mb-2">
                            <div class="d-flex">
                                <div class="service-name">{{ item.name }}</div>
                                <div class="ml-auto mt-auto no-break"><em>{{ item.date }}</em></div>
                            </div>
                        </li>
                        {% endfor %}
                    </ul>
                </div>
            </div>
        </div>
    </div>
</div>
