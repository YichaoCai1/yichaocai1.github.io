short_bio: >-
  <p>
    I am a third-year Ph.D. student in Computer Science at the
    <a href="https://www.adelaide.edu.au/aiml/" target="_blank">Australian Institute for Machine Learning (AIML)</a>,
    <a href="https://www.adelaide.edu.au/" target="_blank">Adelaide University (formerly The University of Adelaide)</a>,
    advised by Prof.
    <a href="https://cs.adelaide.edu.au/~javen/" target="_blank">Javen Qinfeng Shi</a>.
    Before my Ph.D., I received my M.Sc. and B.Eng. degrees from Wuhan University of Technology.
  </p>
  <p>
    I study how language supervision shapes the semantics, geometry, and identifiability of multimodal representations. My long-term goal is to develop principled foundations for language-guided representation learning, with the aim of building multimodal systems that acquire structured, interpretable, and reliable representations of the world.
  </p>

research_interests:
- "<strong>Representation learning:</strong> learning objectives and training paradigms; identifiability theory; semantic structure in learned representations."
- "<strong>Vision-language modeling:</strong> multimodal alignment; multimodal large language models; supervision design and data curation for multimodal learning."
- "<strong>Explainable machine learning:</strong> mechanistic interpretability; representation geometry; latent-structure characterization."

