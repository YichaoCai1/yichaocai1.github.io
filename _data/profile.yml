short_bio: >-
  <p>
    I am a third-year Ph.D. student in Computer Science at the
    <a href="https://www.adelaide.edu.au/aiml/" target="_blank">Australian Institute for Machine Learning (AIML)</a>,
    <a href="https://www.adelaide.edu.au/" target="_blank">Adelaide University (formerly The University of Adelaide)</a>,
    advised by Prof.
    <a href="https://cs.adelaide.edu.au/~javen/" target="_blank">Javen Qinfeng Shi</a>.
    I study representation learning, asking how natural language supervision determines which semantic structure is captured, preserved, or lost in vision-language models
  </p>
  <p>
    My work combines theoretical analysis with controlled empirical study to understand contrastive learning, cross-modal alignment, and identifiability in representation learning, with the long-term goal of building more interpretable and reliable multimodal AI systems.
  </p>

