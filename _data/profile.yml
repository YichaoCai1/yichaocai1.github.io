short_bio: >-
  <p>
    I am a third-year Ph.D. student in Computer Science at the
    <a href="https://www.adelaide.edu.au/aiml/" target="_blank">Australian Institute for Machine Learning (AIML)</a>,
    <a href="https://www.adelaide.edu.au/" target="_blank">University of Adelaide</a>,
    advised by Prof.
    <a href="https://cs.adelaide.edu.au/~javen/" target="_blank">Javen Qinfeng Shi</a>.
    My research studies multimodal representation learning, with a particular focus on contrastive learning theory,
    cross-modal alignment, and identifiable causal representations.
  </p>
  <p>
    More broadly, I am interested in how language supervision shapes semantic structure in vision-language models,
    and how this perspective can support interpretable, reliable, and human-aligned AI systems.
    My work combines theoretical analysis with empirical study to better understand representation formation in modern multimodal models.
  </p>
  <p>
    <strong>Research interests:</strong> multimodal learning, contrastive learning theory, identifiability,
    causal representation learning, and vision-language models.
  </p>

